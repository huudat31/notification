name: notification
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  firebase_core: ^4.7.0
  uuid: ^4.5.3
  json_annotation: ^4.9.0 # Cần thiết để khớp với json_serializable
  get: ^4.7.3
  foundation: ^0.0.5
  dio: ^5.9.2
  get_storage: ^2.1.1
